name: Test

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # The protobufjs override resolves to a lock tree only npm 11 reads;
      # Node 22 ships npm 10, so pin npm 11 to match the node24 runtime.
      - run: npm i -g npm@11
      - run: npm ci
      - run: npm test
        env:
          CI: true
